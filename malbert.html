<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мальберт — Азисов Тамирлан</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="work-screen screen" id="malbert" aria-labelledby="malbert-title" data-work-section>
      <header class="topbar" aria-label="Навигация">
        <a class="pill logo-pill" href="./index.html" aria-label="Азисов Тамирлан">
          <img src="./assets/logotype-hover-bg.png" alt="" class="logo-hover-bg" aria-hidden="true" />
          <img src="./assets/logotype.svg" alt="" class="logo-mark logo-mark-default" />
        </a>

        <nav class="pill nav-pill" aria-label="Основные разделы">
          <a class="type-button" href="#" data-panel="about" data-i18n="nav.about">Обо мне</a>
          <a class="type-button" href="./projects.html" data-i18n="nav.projects">Проекты</a>
          <a class="type-button is-active" href="./malbert.html" data-i18n="nav.malbert">Мальберт</a>
        </nav>

        <div class="pill language-switch" aria-label="Выбор языка" data-active="ru">
          <button class="language-option type-button is-active" type="button" aria-pressed="true">ru</button>
          <button class="language-option type-button" type="button" aria-pressed="false">en</button>
        </div>
      </header>

      <div class="work-copy" data-work-copy>
        <h1 class="type-body-l" id="malbert-title" data-work-title>Turk</h1>
      </div>

      <div class="work-carousel" data-work-carousel>
        <article class="work-card is-active" data-title="Turk" data-primary-label="Пост" data-primary-label-en="Post">
          <img src="./assets/cases/malbert-turk-card.png" alt="Turk" />
        </article>
        <article class="work-card" data-title="Icons Challenge" data-primary-label="Пост" data-primary-label-en="Post">
          <img src="./assets/cases/malbert-icons-card.png" alt="Icons Challenge" />
        </article>
        <article
          class="work-card"
          data-title="OVERLOCK"
          data-subtitle="Game Branding &amp; UI"
          data-primary-label="Кейс"
          data-primary-label-en="Case"
        >
          <img src="./assets/cases/malbert-overlock-card.png" alt="OVERLOCK" />
        </article>
      </div>

      <div class="work-actions type-body-l" data-work-actions>
        <a href="#" data-work-primary>Пост</a>
      </div>

      <footer class="meta type-button" aria-label="Локация и локальное время">
        <span>Saransk, Russia</span>
        <span class="time">
          <span class="clock">--:--:--</span>
          <span class="period">--</span>
        </span>
      </footer>
    </main>

    <section class="footer-screen screen" aria-labelledby="footer-title">
      <div class="footer-artifacts" aria-hidden="true"></div>
      <div class="footer-message">
        <h2 class="type-body-l soft-blur-text" id="footer-title" data-soft-blur data-i18n="footer.title">Есть проект или вопрос?</h2>
        <a
          class="email-button type-body-l soft-blur-text"
          href="mailto:tamirlanazisov55@gmail.com?subject=%D0%9F%D1%80%D0%BE%D0%B5%D0%BA%D1%82%20%2F%20%D0%B2%D0%BE%D0%BF%D1%80%D0%BE%D1%81"
          aria-label="Написать на tamirlanazisov55@gmail.com"
          data-soft-blur
        >
          tamirlanazisov55@gmail.com
        </a>
      </div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
